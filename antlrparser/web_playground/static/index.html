<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>段言 (Duan) Playground</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>段</text></svg>">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="navbar">
        <div class="nav-left">
            <span class="logo">段<span class="logo-accent">言</span></span>
            <span class="logo-sub">Playground</span>
        </div>
        <div class="nav-center">
            <button class="btn btn-examples" onclick="toggleExamples()" title="示例库">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 012.5 1h3A1.5 1.5 0 017 2.5v3A1.5 1.5 0 015.5 7h-3A1.5 1.5 0 011 5.5v-3zm8 0A1.5 1.5 0 0110.5 1h3A1.5 1.5 0 0115 2.5v3A1.5 1.5 0 0113.5 7h-3A1.5 1.5 0 019 5.5v-3zm-8 8A1.5 1.5 0 012.5 9h3A1.5 1.5 0 017 10.5v3A1.5 1.5 0 015.5 15h-3A1.5 1.5 0 011 13.5v-3zm8 0A1.5 1.5 0 0110.5 9h3a1.5 1.5 0 011.5 1.5v3a1.5 1.5 0 01-1.5 1.5h-3A1.5 1.5 0 019 13.5v-3z"/></svg>
                示例
            </button>
            <button class="btn btn-run" onclick="runCode()" id="runBtn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5v11l9-5.5-9-5.5z"/></svg>
                运行
            </button>
            <button class="btn btn-clear" onclick="clearOutput()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM5.5 4.5L8 7l2.5-2.5L12 5.5 9.5 8 12 10.5 10.5 12 8 9.5 5.5 12 4 10.5 6.5 8 4 5.5l1.5-1z"/></svg>
            </button>
        </div>
        <div class="nav-right">
            <button class="btn btn-share" onclick="shareCode()" id="shareBtn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10.5 3.5a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zm-5 9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zm7.5 0a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zM4.36 5.64l4.28 2.72m4.28-2.72l-4.28 2.72"/></svg>
                分享
            </button>
        </div>
    </header>

    <!-- 主区域 -->
    <div class="main-container">
        <!-- 示例库侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>📚 示例库</h3>
                <button class="btn btn-close" onclick="toggleExamples()">✕</button>
            </div>
            <div class="example-list" id="exampleList">
                <div class="example-loading">加载中...</div>
            </div>
        </aside>

        <!-- 编辑器与输出 -->
        <div class="content-area">
            <div class="editor-section">
                <div class="section-header">
                    <span class="section-title">编辑器</span>
                    <span class="file-badge">.duan</span>
                </div>
                <div class="editor-wrapper">
                    <div id="editor" class="editor"></div>
                </div>
            </div>

            <div class="output-section">
                <div class="section-header">
                    <span class="section-title">输出</span>
                    <div class="output-tabs">
                        <button class="tab active" data-tab="output" onclick="switchTab('output')">运行结果</button>
                        <button class="tab" data-tab="ast" onclick="switchTab('ast')">AST 分析</button>
                        <button class="tab" data-tab="tokens" onclick="switchTab('tokens')">Token 分析</button>
                    </div>
                </div>
                <div class="output-wrapper">
                    <div id="outputPanel" class="output-panel">
                        <div class="output-placeholder">点击「运行」查看输出结果</div>
                    </div>
                    <div id="astPanel" class="output-panel hidden">
                        <div class="output-placeholder">点击「运行」查看 AST 分析</div>
                    </div>
                    <div id="tokensPanel" class="output-panel hidden">
                        <div class="output-placeholder">点击「运行」查看 Token 分析</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div class="modal-overlay hidden" id="shareModal">
        <div class="modal">
            <div class="modal-header">
                <h3>🔗 分享代码</h3>
                <button class="btn btn-close" onclick="closeShareModal()">✕</button>
            </div>
            <div class="modal-body">
                <p>链接已生成，点击复制分享给他人：</p>
                <div class="share-url-container">
                    <input type="text" id="shareUrlInput" readonly onclick="this.select()">
                    <button class="btn btn-copy" onclick="copyShareUrl()">复制</button>
                </div>
                <div class="share-tip">对方打开链接即可看到你的代码</div>
            </div>
        </div>
    </div>

    <!-- 覆盖层 -->
    <div class="overlay hidden" id="overlay" onclick="closeShareModal()"></div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
