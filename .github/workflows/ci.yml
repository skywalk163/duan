name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov

      # 运行单元测试
      - name: Unit Tests
        run: |
          pytest tests/unit/ -v --tb=short

      # 运行集成测试
      - name: Integration Tests
        run: |
          pytest tests/integration/ -v --tb=short

      # 运行端到端测试
      - name: End-to-End Tests
        run: |
          pytest tests/e2e/ -v --tb=short

      # 运行 legacy 功能测试（向后兼容）
      - name: Legacy Feature Tests
        run: |
          python tests/_test_three_features.py
          python tests/_test_hm_inference.py
          python tests/_test_null_safety.py
          python tests/_test_package_system.py

      # 统一测试运行器
      - name: Unified Test Runner
        run: |
          python tests/run_tests.py --quick

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8
      - name: Lint check
        run: |
          flake8 src/ cli/ --count --statistics --max-line-length=120 || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify package metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
